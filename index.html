<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>l!mber — Generative Translator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow:ital,wght@0,400;0,500;0,600;0,700;1,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header class="header">
    <div class="header-left">
      <span class="logo">l<em>!</em>mber</span>
    </div>
    <div class="mode-toggle" role="group" aria-label="보기 모드">
      <button class="mode-btn active" id="split-btn">Split</button>
      <button class="mode-btn" id="node-btn">Node</button>
    </div>
    <div class="header-right">
      <button class="icon-btn" id="auth-logout" title="잠금">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true">
          <rect x="3" y="7" width="10" height="7" rx="1.5" stroke="currentColor" stroke-width="1.4"/>
          <path d="M5 7V5a3 3 0 016 0v2" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
        </svg>
      </button>
      <button class="icon-btn" id="settings-btn" title="설정">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none" aria-hidden="true">
          <circle cx="9" cy="9" r="2.5" stroke="currentColor" stroke-width="1.4"/>
          <path d="M9 1.5v2M9 14.5v2M1.5 9h2M14.5 9h2M3.7 3.7l1.4 1.4M12.9 12.9l1.4 1.4M3.7 14.3l1.4-1.4M12.9 5.1l1.4-1.4" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
        </svg>
      </button>
    </div>
  </header>

  <div class="auth-gate" id="auth-gate" aria-modal="true" role="dialog" aria-label="접근 잠금" hidden>
    <form class="auth-card" id="auth-form">
      <span class="logo auth-logo">l<em>!</em>mber</span>
      <p class="auth-title">비밀번호가 필요합니다</p>
      <input
        type="password"
        id="auth-password"
        class="auth-input"
        placeholder="Access password"
        autocomplete="current-password"
        aria-label="접근 비밀번호"
      >
      <button class="auth-submit" type="submit">Unlock</button>
      <p class="auth-error" id="auth-error" role="alert"></p>
    </form>
  </div>

  <!-- ======================== SPLIT VIEW ======================== -->
  <main id="split-view" class="split-view">

    <section class="panel input-panel" aria-label="입력">
      <div class="panel-header">
        <span class="panel-label">Input</span>
        <button class="icon-btn" id="clear-input" title="지우기">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none" aria-hidden="true">
            <path d="M11 3L3 11M3 3l8 8" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
          </svg>
        </button>
      </div>

      <div class="input-body" id="input-body">
        <textarea
          id="input-text"
          placeholder="번역할 텍스트를 입력하거나&#10;이미지를 드래그하세요"
          spellcheck="false"
          aria-label="입력 텍스트"
        ></textarea>

        <div class="image-preview-wrap" id="image-preview-wrap" hidden>
          <img id="image-preview" src="" alt="첨부 이미지 미리보기">
          <button class="remove-image-btn" id="remove-image" title="이미지 제거">
            <svg width="12" height="12" viewBox="0 0 12 12" fill="none" aria-hidden="true">
              <path d="M9 3L3 9M3 3l6 6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            </svg>
          </button>
        </div>

        <div class="drop-overlay" id="drop-overlay" aria-hidden="true">
          <svg width="36" height="36" viewBox="0 0 36 36" fill="none">
            <path d="M18 6v16M10 14l8-8 8 8" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M6 26h24" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          </svg>
          <p>이미지를 놓으세요</p>
        </div>
      </div>
    </section>

    <div class="split-divider" aria-hidden="true">
      <button class="translate-btn" id="translate-btn">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true">
          <path d="M3 8h10M9 4l4 4-4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <span>Translate</span>
      </button>
    </div>

    <section class="panel output-panel" aria-label="출력">
      <div class="panel-header">
        <span class="panel-label">Output</span>
        <div class="output-actions">
          <button class="icon-btn speak-btn" id="speak-btn" title="읽어주기" disabled>
            <svg id="speak-icon" width="14" height="14" viewBox="0 0 14 14" fill="none" aria-hidden="true">
              <path d="M2 5h2.5L8 2v10L4.5 9H2V5z" stroke="currentColor" stroke-width="1.3" stroke-linejoin="round"/>
              <path d="M10 4.5a3 3 0 010 5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
            </svg>
          </button>
          <button class="icon-btn" id="copy-output" title="복사">
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none" aria-hidden="true">
              <rect x="4" y="4" width="8" height="8" rx="1.5" stroke="currentColor" stroke-width="1.4"/>
              <path d="M10 4V2.5A.5.5 0 009.5 2h-7a.5.5 0 00-.5.5v7a.5.5 0 00.5.5H4" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
            </svg>
          </button>
          <button class="icon-btn" id="download-output" title="다운로드">
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none" aria-hidden="true">
              <path d="M7 2v7M4 7l3 3 3-3" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
              <path d="M2 11h10" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
            </svg>
          </button>
        </div>
      </div>

      <div class="output-controls">
        <div class="select-combo" data-custom-select>
          <input type="hidden" id="out-format" value="translate">
          <button class="select-display" id="out-format-btn" type="button" aria-label="출력 형식" aria-expanded="false">
            <span>번역</span>
            <svg width="12" height="12" viewBox="0 0 12 12" fill="none" aria-hidden="true">
              <path d="M3 4.5l3 3 3-3" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </button>
          <div class="select-menu" id="out-format-menu" hidden>
            <button type="button" data-select-value="translate">번역</button>
            <button type="button" data-select-value="explain">설명/해석</button>
            <button type="button" data-select-value="summarize">요약</button>
            <button type="button" data-select-value="bullets">불릿포인트</button>
            <button type="button" data-select-value="rewrite">재작성</button>
            <button type="button" data-select-value="image">이미지 생성</button>
            <button type="button" data-select-value="audio">음성 생성</button>
            <button type="button" data-select-value="video">동영상 생성</button>
          </div>
        </div>
        <div class="tone-combo" id="tone-combo">
          <input
            type="text"
            id="out-tone"
            class="ctrl-input ctrl-tone"
            placeholder="말투 선택 또는 직접 입력"
            autocomplete="off"
            aria-label="말투"
          >
          <button class="tone-menu-btn" id="tone-menu-btn" type="button" aria-label="추천 말투 보기" aria-expanded="false">
            <svg width="12" height="12" viewBox="0 0 12 12" fill="none" aria-hidden="true">
              <path d="M3 4.5l3 3 3-3" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </button>
          <div class="tone-menu" id="tone-menu" hidden>
            <button type="button" data-tone-preset="중립">중립</button>
            <button type="button" data-tone-preset="격식체">격식체</button>
            <button type="button" data-tone-preset="구어체">구어체</button>
            <button type="button" data-tone-preset="오은영 박사 말투">오은영 박사 말투</button>
            <button type="button" data-tone-preset="힙합 가사체">힙합 가사체</button>
            <button type="button" data-tone-preset="ISTP 말투">ISTP 말투</button>
          </div>
        </div>
        <div class="select-combo" data-custom-select>
          <input type="hidden" id="out-lang" value="ko">
          <button class="select-display" id="out-lang-btn" type="button" aria-label="출력 언어" aria-expanded="false">
            <span>한국어</span>
            <svg width="12" height="12" viewBox="0 0 12 12" fill="none" aria-hidden="true">
              <path d="M3 4.5l3 3 3-3" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </button>
          <div class="select-menu" id="out-lang-menu" hidden>
            <button type="button" data-select-value="ko">한국어</button>
            <button type="button" data-select-value="en">English</button>
            <button type="button" data-select-value="ja">日本語</button>
            <button type="button" data-select-value="zh">中文</button>
            <button type="button" data-select-value="es">Español</button>
          </div>
        </div>
      </div>

      <div class="output-body">
        <p class="output-placeholder" id="output-placeholder">번역 결과가 여기에 표시됩니다</p>
        <div class="output-text" id="output-text" hidden></div>
        <div class="output-image-wrap" id="output-image-wrap" hidden>
          <img id="output-image" src="" alt="생성된 이미지">
          <p class="output-image-prompt" id="output-image-prompt"></p>
        </div>
        <div class="output-audio-wrap" id="output-audio-wrap" hidden>
          <div class="output-audio-text" id="output-audio-text"></div>
          <div class="audio-player-row">
            <div class="audio-generating" id="audio-generating" hidden>
              <div class="audio-wave">
                <span></span><span></span><span></span><span></span><span></span>
              </div>
              <span class="audio-generating-label">음성 생성 중...</span>
            </div>
            <audio id="audio-player" controls preload="auto" hidden></audio>
          </div>
        </div>
        <div class="output-video-wrap" id="output-video-wrap" hidden>
          <video id="output-video" controls playsinline></video>
          <p class="output-image-prompt" id="output-video-prompt"></p>
        </div>
        <div class="video-loading" id="video-loading" hidden aria-live="polite">
          <div class="image-loading-inner">
            <div class="video-dots">
              <span></span><span></span><span></span>
            </div>
            <p class="image-loading-title">동영상 생성 중</p>
            <p class="image-loading-sub">Sora 2 모델이 작업 중입니다<br>보통 몇 분 정도 소요됩니다</p>
            <p class="video-elapsed" id="video-elapsed">0:00 경과</p>
          </div>
        </div>
        <div class="image-loading" id="image-loading" hidden aria-live="polite">
          <div class="image-loading-inner">
            <div class="image-spinner"></div>
            <p class="image-loading-title">이미지 생성 중</p>
            <p class="image-loading-sub">DALL·E 3 모델이 이미지를 만들고 있습니다<br>20–60초 정도 소요될 수 있어요</p>
          </div>
        </div>
        <div class="skeleton-wrap" id="skeleton-wrap" hidden aria-label="로딩 중" aria-live="polite">
          <div class="skeleton long"></div>
          <div class="skeleton medium"></div>
          <div class="skeleton long"></div>
          <div class="skeleton short"></div>
          <div class="skeleton medium"></div>
        </div>
      </div>
    </section>
  </main>

  <!-- ======================== NODE VIEW ======================== -->
  <main id="node-view" class="node-view" hidden aria-label="노드 캔버스">
    <div class="canvas-toolbar">
      <button class="toolbar-btn" id="add-root-node">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none" aria-hidden="true">
          <path d="M7 2v10M2 7h10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
        새 노드
      </button>
      <button class="toolbar-btn" id="reset-view-btn">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none" aria-hidden="true">
          <path d="M2 7a5 5 0 105-5 5 5 0 00-4.9 4" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
          <path d="M2 3.5V7h3.5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        보기 초기화
      </button>
    </div>

    <div class="node-empty-state" id="node-empty-state">
      <p class="node-empty-title">새 노드 추가</p>
      <p class="node-empty-sub">상단의 버튼을 클릭하거나 캔버스를 클릭해 시작하세요</p>
    </div>

    <svg id="connections-svg" class="connections-svg" aria-hidden="true"></svg>
    <div id="node-canvas" class="node-canvas"></div>

    <div class="canvas-hint" aria-hidden="true">드래그로 이동 &middot; 스크롤로 확대/축소</div>
  </main>

  <!-- ======================== SETTINGS PANEL ======================== -->
  <div class="settings-backdrop" id="settings-backdrop" aria-hidden="true"></div>

  <aside id="settings-panel" class="settings-panel" aria-label="설정">
    <div class="settings-header">
      <h2>설정</h2>
      <button class="icon-btn" id="close-settings" title="닫기">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true">
          <path d="M12 4L4 12M4 4l8 8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
      </button>
    </div>

    <div class="settings-body">
      <div class="settings-section">
        <label class="settings-label" for="default-format">기본 출력 형식</label>
        <select id="default-format" class="settings-select">
          <option value="translate">번역</option>
          <option value="explain">설명/해석</option>
          <option value="summarize">요약</option>
          <option value="bullets">불릿포인트</option>
          <option value="rewrite">재작성</option>
          <option value="image">이미지 생성</option>
          <option value="audio">음성 생성</option>
          <option value="video">동영상 생성</option>
        </select>
      </div>

      <div class="settings-section">
        <label class="settings-label" for="default-tone">기본 말투</label>
        <select id="default-tone" class="settings-select">
          <option value="neutral">중립</option>
          <option value="formal">격식체</option>
          <option value="casual">구어체</option>
        </select>
      </div>

      <div class="settings-section">
        <label class="settings-label" for="default-lang">기본 출력 언어</label>
        <select id="default-lang" class="settings-select">
          <option value="ko">한국어</option>
          <option value="en">English</option>
          <option value="ja">日本語</option>
          <option value="zh">中文</option>
          <option value="es">Español</option>
        </select>
      </div>
    </div>
  </aside>

  <!-- Toast -->
  <div class="toast" id="toast" role="status" aria-live="polite"></div>

  <script src="app.js"></script>
</body>
</html>
